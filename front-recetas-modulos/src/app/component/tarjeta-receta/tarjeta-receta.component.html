<div class="group rounded-lg border">
  <a class="w-full overflow-hidden rounded-t-lg bg-gray-200">
    <!-- Imagen del plato -->
    <img [src]="receta.strMealThumb" alt="{{ receta.strMeal }}"
      class="h-60 w-60 object-cover object-center group-hover:opacity-75">
  </a>
  <div class="flex flex-col space-y-2 p-4">
    <!-- Nombre del plato -->
    <h3 class="text-lg text-gray-700"><strong>{{ receta.strMeal }}</strong></h3>
    <!-- Aquí puedes agregar más información si fuera necesario -->
    <button class="text-black bg-gray-200 font-medium rounded-lg text-sm px-5 py-2.5 w-full">
      <a [routerLink]="['/detalle-receta', receta.idMeal]">ver receta</a>
    </button>
  </div>
</div>
