<div class="max-w-4xl mx-auto p-6">
  <form action="#" method="POST">
      <!-- Título del formulario -->
      <h2 class="text-3xl font-semibold text-gray-900 mb-6 text-center">Crear Nueva Receta</h2>

      <!-- Categoría -->
      <div class="mb-4">
          <label for="category" class="block text-gray-700 text-sm font-medium mb-2">Categoría</label>
          <select id="category" name="category_id" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
              <option value="" disabled selected>Selecciona una categoría</option>
              <option value="1">Categoría 1</option>
              <option value="2">Categoría 2</option>
              <option value="3">Categoría 3</option>
          </select>
      </div>

      <!-- Título -->
      <div class="mb-4">
          <label for="title" class="block text-gray-700 text-sm font-medium mb-2">Título</label>
          <input id="title" name="title" type="text" required
              class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <!-- Descripción -->
      <div class="mb-4">
          <label for="description" class="block text-gray-700 text-sm font-medium mb-2">Descripción</label>
          <textarea id="description" name="description" rows="4" required
              class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
      </div>

      <!-- Ingredientes -->
      <div class="mb-4">
          <label for="ingredients" class="block text-gray-700 text-sm font-medium mb-2">Ingredientes</label>
          <textarea id="ingredients" name="ingredients" rows="4" required
              class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
      </div>

      <!-- Instrucciones -->
      <div class="mb-4">
          <label for="instructions" class="block text-gray-700 text-sm font-medium mb-2">Instrucciones</label>
          <textarea id="instructions" name="instructions" rows="4" required
              class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500"></textarea>
      </div>

      <!-- Tags -->
      <div class="mb-4">
          <label for="tags" class="block text-gray-700 text-sm font-medium mb-2">Etiquetas</label>
          <select id="tags" name="tags" class="block w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500" multiple>
              <option value="tag1">Etiqueta 1</option>
              <option value="tag2">Etiqueta 2</option>
              <option value="tag3">Etiqueta 3</option>
          </select>
      </div>

      <!-- Imagen -->
      <div class="mb-4">
          <label for="image" class="block text-gray-700 text-sm font-medium mb-2">Imagen (opcional)</label>
          <input id="image" name="image" type="file" accept="image/*"
              class="block w-full text-sm text-gray-500 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
      </div>

      <!-- Botón de Enviar -->
      <div class="text-center">
          <button type="submit" class="text-white bg-blue-600 px-6 py-3 rounded-lg shadow-lg hover:bg-blue-700 focus:outline-none focus:ring-4 focus:ring-blue-500">
              Crear Receta
          </button>
      </div>
  </form>
</div>
