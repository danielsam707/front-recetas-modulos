<div class="max-w-4xl mx-auto p-6">
  <!-- Encabezado de la receta -->
  <div class="text-center mb-8">
    <h1>{{ recetaId }}</h1> <!-- Muestra el ID de la receta -->
    <h1 class="text-3xl font-semibold text-gray-800 mb-2">{{ receta?.title }}</h1>
    <p class="text-lg text-gray-600 mb-4">Por: {{ receta?.author }}</p>
    <p class="text-sm text-gray-500">Categoría: {{ receta?.category }} | Etiquetas: {{ receta?.tags }}</p>
  </div>

  <!-- Imagen de la receta -->
  <div class="mb-8">
    <img src="{'imagen de receta'}" alt="Imagen de la receta" class="w-full h-80 object-cover rounded-lg shadow-lg">
  </div>

  <!-- Descripción -->
  <div class="mb-8">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Descripción</h2>
    <p class="text-gray-600">{{ receta?.description }}</p>
  </div>

  <!-- Ingredientes -->
  <div class="mb-8">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Ingredientes</h2>
    <p class="text-gray-600">{{ receta?.ingredients }}</p>
  </div>

  <!-- Instrucciones -->
  <div class="mb-8">
    <h2 class="text-2xl font-semibold text-gray-700 mb-4">Instrucciones</h2>
    <p class="text-gray-600">{{ receta?.instructions }}</p>
  </div>

  <!-- Botones de editar y eliminar (solo si la receta es del usuario) -->
  <div *ngIf="isRecetaDelUsuario" class="text-center mt-6 space-x-4">
    <button (click)="editarReceta()" class="text-white bg-yellow-500 px-6 py-3 rounded-lg shadow-lg hover:bg-yellow-600">
      Editar Receta
    </button>
    <button (click)="eliminarReceta()" class="text-white bg-red-500 px-6 py-3 rounded-lg shadow-lg hover:bg-red-600">
      Eliminar Receta
    </button>
  </div>

  <!-- Botón para volver a la lista de recetas -->
  <div class="text-center mt-6">
    <a routerLink="/" class="text-white bg-blue-600 px-6 py-3 rounded-lg shadow-lg hover:bg-blue-700">
      Volver a la lista de recetas
    </a>
  </div>
</div>
